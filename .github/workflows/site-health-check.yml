name: Site Health Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Which environment to check"
        type: choice
        options:
          - both
          - dev
          - prod
        default: both

permissions:
  actions: write
  contents: read

jobs:
  health-check:
    name: health-check (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dev
            environment: dev
            url: https://ghcp-hackathon-dev-app.icybush-ed45e635.eastus2.azurecontainerapps.io
            container_app: ghcp-hackathon-dev-app
          - name: prod
            environment: production
            url: https://ghcp-hackathon-prod-app.ambitiousbeach-052ceef7.eastus2.azurecontainerapps.io
            container_app: ghcp-hackathon-prod-app
        exclude:
          - name: ${{ github.event.inputs.environment == 'prod' && 'dev' || 'NONE' }}
          - name: ${{ github.event.inputs.environment == 'dev' && 'prod' || 'NONE' }}
    steps:
      - name: Check site availability
        id: check
        run: |
          SITE_URL="${{ matrix.url }}"
          AGENDA_URL="${SITE_URL}/agenda.json"

          echo "🔍 Checking ${{ matrix.name }} site: $SITE_URL"

          # Check main page
          HTTP_STATUS=$(curl -s -o /tmp/response.html -w '%{http_code}' --max-time 30 "$SITE_URL" 2>/dev/null || echo "000")
          RESPONSE_TIME=$(curl -s -o /dev/null -w '%{time_total}' --max-time 30 "$SITE_URL" 2>/dev/null || echo "0")
          echo "site_status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
          echo "response_time=$RESPONSE_TIME" >> "$GITHUB_OUTPUT"

          # Check content
          if [ "$HTTP_STATUS" = "200" ] && grep -q "GitHub Copilot" /tmp/response.html 2>/dev/null; then
            echo "content_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "content_ok=false" >> "$GITHUB_OUTPUT"
          fi

          # Check agenda endpoint
          AGENDA_STATUS=$(curl -s -o /tmp/agenda.json -w '%{http_code}' --max-time 15 "$AGENDA_URL" 2>/dev/null || echo "000")
          if [ "$AGENDA_STATUS" = "200" ] && jq -e '.days' /tmp/agenda.json >/dev/null 2>&1; then
            echo "agenda_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "agenda_ok=false" >> "$GITHUB_OUTPUT"
          fi

          # Determine overall health
          if [ "$HTTP_STATUS" = "200" ] && grep -q "GitHub Copilot" /tmp/response.html 2>/dev/null && [ "$AGENDA_STATUS" = "200" ]; then
            echo "healthy=true" >> "$GITHUB_OUTPUT"
            echo "✅ ${{ matrix.name }} site is healthy (HTTP $HTTP_STATUS, ${RESPONSE_TIME}s)"
          else
            echo "healthy=false" >> "$GITHUB_OUTPUT"
            echo "❌ ${{ matrix.name }} site is DOWN or degraded (HTTP $HTTP_STATUS)"
          fi

      - name: Dispatch agentic repair workflow
        if: steps.check.outputs.healthy == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🚨 ${{ matrix.name }} site is unhealthy — dispatching auto-repair agent"
          gh workflow run "site-health-monitor.lock.yml" \
            --repo "${{ github.repository }}" \
            -f site_status="${{ steps.check.outputs.site_status }}" \
            -f response_time="${{ steps.check.outputs.response_time }}" \
            -f content_ok="${{ steps.check.outputs.content_ok }}" \
            -f agenda_ok="${{ steps.check.outputs.agenda_ok }}" \
            -f environment="${{ matrix.name }}"

      - name: Summary
        run: |
          echo "### Site Health Check Results — ${{ matrix.name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** ${{ matrix.name }} (${{ matrix.environment }})" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** ${{ matrix.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Container App:** ${{ matrix.container_app }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outputs.healthy }}" = "true" ]; then
            echo "✅ **All checks passed**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ **Site is unhealthy — repair agent dispatched**" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| HTTP Status | ${{ steps.check.outputs.site_status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Response Time | ${{ steps.check.outputs.response_time }}s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Content OK | ${{ steps.check.outputs.content_ok }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Agenda OK | ${{ steps.check.outputs.agenda_ok }} |" >> "$GITHUB_STEP_SUMMARY"
